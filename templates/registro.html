{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <div class="card">
        <div class="card-header text-center">
            <i class="bi bi-person-plus me-2"></i>Crear cuenta
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-person me-1"></i>Usuario</label>
                    <input type="text" name="username" class="form-control" placeholder="Elegí un usuario" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-envelope me-1"></i>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="tu@email.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-lock me-1"></i>Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="Creá una contraseña" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2 mt-2">
                    <i class="bi bi-person-plus me-2"></i>Crear cuenta
                </button>
            </form>
            <p class="mt-4 text-center text-muted mb-0">
                ¿Ya tenés cuenta? <a href="{{ url_for('auth.login') }}" class="text-info fw-semibold">Iniciá sesión</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
