{% extends "base.html" %}

{% block title %}Registro — Prode Mundialiyo 2026{% endblock %}

{% block content %}
<section style="min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 40px 20px; flex: 1;">
    <div style="width: 100%; max-width: 440px;">
        <!-- Header -->
        <div style="text-align: center; margin-bottom: 32px;" class="animate-fade-in-up">
            <div style="margin-bottom: 16px;">
                <img src="/static/img/favicon.svg" alt="Copa del Mundo" width="64" height="64" style="border-radius: 12px;">
            </div>
            <h2 style="font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 2px; margin-bottom: 6px; color: var(--wc-white);">
                UNITE AL <span class="text-gradient-magenta">PRODE</span>
            </h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">
                Creá tu cuenta y empezá a pronosticar los 104 partidos del Mundial 2026
            </p>
        </div>

        <!-- Registration Card -->
        <div class="auth-card no-hero" style="opacity: 1; max-width: 100%; margin-top: 0;">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-person-plus"></i>
                    Crear cuenta
                </div>
                <div class="card-body">
                    <form method="POST" autocomplete="on">
                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="bi bi-person"></i> Usuario
                            </label>
                            <input
                                type="text"
                                id="username"
                                name="username"
                                class="form-control"
                                placeholder="Elegí un nombre de usuario"
                                required
                                autocomplete="username"
                                minlength="3"
                                maxlength="20"
                            >
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                <i class="bi bi-envelope"></i> Email
                            </label>
                            <input
                                type="email"
                                id="email"
                                name="email"
                                class="form-control"
                                placeholder="tu@email.com"
                                required
                                autocomplete="email"
                            >
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock"></i> Contraseña
                            </label>
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-control"
                                placeholder="Mínimo 6 caracteres"
                                required
                                autocomplete="new-password"
                                minlength="6"
                            >
                        </div>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-person-plus"></i> Crear cuenta
                        </button>
                    </form>

                    <div class="divider-text">o registrate con</div>

                    <a href="/google/login" class="btn btn-google">
                        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </a>

                    <p class="auth-footer">
                        ¿Ya tenés cuenta? <a href="{{ url_for('auth.login') }}">Iniciá sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
