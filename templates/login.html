{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <div class="card">
        <div class="card-header text-center">
            <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar sesión
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-person me-1"></i>Usuario</label>
                    <input type="text" name="username" class="form-control" placeholder="Tu usuario" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-lock me-1"></i>Contraseña</label>
                    <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                </button>
            </form>
            <div class="text-center mt-3">
                <div class="text-muted mb-2"><small>o continuá con</small></div>
                <a href="{{ url_for('google.login') }}" class="btn btn-outline-light w-100 py-2">
                    <i class="bi bi-google me-2" style="color: #4285F4;"></i>Google
                </a>
            </div>
            <p class="mt-3 text-center text-muted mb-0">
                ¿No tenés cuenta? <a href="{{ url_for('auth.registro') }}" class="text-info fw-semibold">Registrate</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
