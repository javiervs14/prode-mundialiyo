    <rect x="-15" y="30" width="30" height="15" fill="url(#g1)" opacity="0.7"/>
    <rect x="-25" y="45" width="50" height="8" rx="2" fill="url(#g1)"/>
    <circle cx="0" cy="-50" r="5" fill="#A6FF00"/>
  </g>
  <!-- "26" text -->
  <text x="200" y="210" text-anchor="middle" font-size="60" font-weight="900" font-family="Arial,sans-serif" fill="url(#g1)">26</text>
  <text x="200" y="240" text-anchor="middle" font-size="12" font-weight="700" font-family="Arial,sans-serif" fill="#A6FF00" letter-spacing="3">WORLD CUP</text>
  <text x="200" y="260" text-anchor="middle" font-size="10" font-weight="600" font-family="Arial,sans-serif" fill="#E4007C" letter-spacing="2">CANADA · MEXICO · USA</text>
