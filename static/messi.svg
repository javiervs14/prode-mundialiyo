<svg xmlns="http://www.w3.org/2000/svg" width="300" height="380" viewBox="0 0 300 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1520"/>
      <stop offset="100%" style="stop-color:#000"/>
    </linearGradient>
    <linearGradient id="jersey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#75aadb"/>
      <stop offset="50%" style="stop-color:#5b9bd5"/>
      <stop offset="100%" style="stop-color:#3d7ab8"/>
    </linearGradient>
    <linearGradient id="fifaGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E4007C"/>
      <stop offset="50%" style="stop-color:#7B2FF7"/>
      <stop offset="100%" style="stop-color:#A6FF00"/>
    </linearGradient>
  </defs>

  <rect width="300" height="380" rx="16" fill="url(#bg)"/>

  <!-- FIFA 2026 badge top -->
  <rect x="90" y="10" width="120" height="22" rx="11" fill="rgba(228,0,124,0.15)" stroke="rgba(228,0,124,0.3)" stroke-width="1"/>
  <text x="150" y="25" text-anchor="middle" font-size="10" font-weight="700" font-family="Arial,sans-serif" fill="url(#fifaGrad)" letter-spacing="2">FIFA WORLD CUP 2026</text>

  <!-- Head -->
  <ellipse cx="150" cy="85" rx="38" ry="42" fill="#e8c4a0"/>
  <!-- Hair -->
  <path d="M115,75 Q120,45 150,42 Q180,45 185,80 Q180,65 165,60 Q150,55 135,58 Q120,62 115,75 Z" fill="#4a3020"/>
  <path d="M125,60 Q140,50 160,55 Q175,58 180,72 Q170,65 155,63 Q140,62 130,65 Z" fill="#5a3a25"/>

  <!-- Face features -->
  <ellipse cx="138" cy="85" rx="3" ry="4" fill="#3a2a1a"/>
  <ellipse cx="162" cy="85" rx="3" ry="4" fill="#3a2a1a"/>
  <path d="M138,100 Q150,106 162,100" stroke="#c4a080" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Beard -->
  <path d="M120,100 Q130,115 150,118 Q170,115 180,100 Q175,110 150,112 Q125,110 120,100 Z" fill="#4a3020" opacity="0.4"/>

  <!-- Neck -->
  <rect x="138" y="120" width="24" height="18" fill="#e8c4a0"/>

  <!-- Jersey -->
  <path d="M105,140 L195,140 L210,230 L185,320 L115,320 L90,230 Z" fill="url(#jersey)"/>

  <!-- Jersey stripes (Argentina) -->
  <rect x="105" y="140" width="90" height="5" fill="#fff" opacity="0.9"/>
  <rect x="100" y="160" width="100" height="4" fill="#fff" opacity="0.7"/>

  <!-- Collar -->
  <path d="M135,140 L150,155 L165,140 Z" fill="#fff"/>
  <path d="M138,142 L150,152 L162,142" stroke="#75aadb" stroke-width="1" fill="none"/>

  <!-- Number 10 -->
  <text x="150" y="245" text-anchor="middle" font-size="55" font-weight="900" font-family="Arial,sans-serif" fill="#fff">10</text>

  <!-- Arms -->
  <rect x="88" y="145" width="20" height="75" rx="10" fill="url(#jersey)"/>
  <rect x="192" y="145" width="20" height="75" rx="10" fill="url(#jersey)"/>

  <!-- Name plate -->
  <rect x="30" y="325" width="240" height="45" rx="10" fill="rgba(75,170,219,0.12)" stroke="rgba(75,170,219,0.25)" stroke-width="1"/>
  <text x="150" y="352" text-anchor="middle" font-size="22" font-weight="900" font-family="Arial,sans-serif" fill="#75aadb">MESSI</text>
  <text x="150" y="367" text-anchor="middle" font-size="9" font-weight="600" font-family="Arial,sans-serif" fill="#888" letter-spacing="2">CAPITÁN · ARGENTINA · #10</text>
</svg>
