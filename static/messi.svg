<svg xmlns="http://www.w3.org/2000/svg" width="300" height="350" viewBox="0 0 300 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="jersey" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#75aadb"/>
      <stop offset="100%" style="stop-color:#4a7cb5"/>
    </linearGradient>
  </defs>
  <rect width="300" height="350" rx="16" fill="url(#bg)"/>
  <!-- Head -->
  <circle cx="150" cy="80" r="35" fill="#f0c8a0"/>
  <!-- Hair -->
  <path d="M120,70 Q130,45 150,45 Q175,45 180,75 Q175,60 150,58 Q130,60 120,70 Z" fill="#5a3a2a"/>
  <!-- Body/Jersey -->
  <path d="M110,120 L190,120 L200,200 L180,280 L120,280 L100,200 Z" fill="url(#jersey)"/>
  <!-- Jersey collar -->
  <path d="M135,120 L150,135 L165,120 Z" fill="#fff"/>
  <!-- Number 10 -->
  <text x="150" y="210" text-anchor="middle" font-size="50" font-weight="900" font-family="Arial,sans-serif" fill="#fff">10</text>
  <!-- Arms -->
  <rect x="95" y="125" width="18" height="70" rx="9" fill="url(#jersey)"/>
  <rect x="187" y="125" width="18" height="70" rx="9" fill="url(#jersey)"/>
  <!-- Name -->
  <rect x="40" y="290" width="220" height="40" rx="8" fill="rgba(75,170,219,0.15)"/>
  <text x="150" y="316" text-anchor="middle" font-size="20" font-weight="800" font-family="Arial,sans-serif" fill="#75aadb">MESSI</text>
  <text x="150" y="338" text-anchor="middle" font-size="10" font-weight="500" font-family="Arial,sans-serif" fill="#888">CAPITÁN · ARGENTINA</text>
</svg>
