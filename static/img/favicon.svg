<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#CC8800"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E4007C"/>
      <stop offset="33%" style="stop-color:#7B2FF7"/>
      <stop offset="66%" style="stop-color:#0047BB"/>
      <stop offset="100%" style="stop-color:#A6FF00"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#0A0E27"/>

  <!-- FIFA 2026 ring -->
  <circle cx="128" cy="128" r="118" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.6"/>

  <!-- Trophy: curved body -->
  <path d="M88,60 Q88,40 128,40 Q168,40 168,60 L160,110 Q160,140 128,140 Q96,140 96,110 Z"
        fill="url(#trophyGrad)" opacity="0.95"/>

  <!-- Trophy handles -->
  <path d="M88,65 Q70,65 70,85 Q70,100 88,100" fill="none" stroke="url(#trophyGrad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M168,65 Q186,65 186,85 Q186,100 168,100" fill="none" stroke="url(#trophyGrad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Trophy stem -->
  <rect x="118" y="140" width="20" height="20" fill="url(#trophyGrad)" opacity="0.9"/>

  <!-- Trophy base -->
  <rect x="100" y="160" width="56" height="14" rx="3" fill="url(#trophyGrad)"/>
  <rect x="92" y="174" width="72" height="12" rx="4" fill="url(#trophyGrad)" opacity="0.85"/>

  <!-- Trophy top knob -->
  <circle cx="128" cy="34" r="6" fill="url(#trophyGrad)"/>

  <!-- Shine -->
  <ellipse cx="112" cy="80" rx="8" ry="25" fill="#fff" opacity="0.15"/>

  <!-- "26" text -->
  <text x="128" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="900" fill="url(#ringGrad)">26</text>
</svg>
